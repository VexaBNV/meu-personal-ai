# ══════════════════════════════════════════════════════════════
# flutter_launcher_icons.yaml
#
# Requisitos antes de rodar:
# 1. Coloque seu ícone em assets/icons/app_icon.png (1024×1024px, PNG)
# 2. Execute: flutter pub run flutter_launcher_icons
#
# O ícone deve:
# - Ter fundo laranja (#FF6B1A) com as letras "MP" em branco
# - Ser 1024×1024px mínimo
# - Ter cantos RETOS (o sistema arredonda automaticamente)
# - iOS: sem fundo transparente
# ══════════════════════════════════════════════════════════════

flutter_launcher_icons:
  # ── iOS ──────────────────────────────────────────────────────
  ios: true
  image_path_ios: "assets/icons/app_icon.png"
  remove_alpha_ios: true          # iOS não aceita transparência

  # ── Android ──────────────────────────────────────────────────
  android: true
  image_path_android: "assets/icons/app_icon.png"
  
  # Adaptive icon (Android 8+)
  adaptive_icon_background: "#FF6B1A"       # laranja brand
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  # Foreground: ícone centrado com padding de ~20% (safe zone)
  # Salve em assets/icons/app_icon_foreground.png

  # Android 12+ monocromático (opcional mas recomendado)
  adaptive_icon_monochrome: "assets/icons/app_icon_monochrome.png"

  # ── Web (opcional) ───────────────────────────────────────────
  web:
    generate: false

  # ── Windows (opcional) ───────────────────────────────────────
  windows:
    generate: false

