name: meu_personal_ai
description: Seu personal trainer com inteligência artificial

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegação
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Auth
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  firebase_messaging: ^14.9.4
  google_sign_in: ^6.2.1

  # ── PAGAMENTOS ─────────────────────────────────────────
  # RevenueCat: in-app purchases iOS + Android
  purchases_flutter: ^7.5.0

  # ── STORAGE LOCAL ──────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Gráficos
  fl_chart: ^0.68.0

  # Câmera / Imagem
  image_picker: ^1.1.2
  image_cropper: ^7.1.0

  # Health (Apple Health + Google Fit)
  health: ^10.2.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.1
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FF6B1A"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#111111"
  image: assets/icons/app_icon.png
  android: true
  ios: true
